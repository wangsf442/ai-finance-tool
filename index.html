<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI财务测算工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .metric-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; padding: 20px; }
        .metric-value { font-size: 2rem; font-weight: 700; }
        .input-field { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
        .btn-primary { background-color: #2563eb; color: white; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .text-profit { color: #16a34a; }
        .text-loss { color: #dc2626; }
        .table-cell { padding: 12px 16px; text-align: left; }
        #chatContainer { height: 360px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; background-color: #f9fafb; }
        .chat-message { margin-bottom: 12px; }
        .chat-user { font-weight: 600; color: #1f2937; }
        .chat-ai { font-weight: 600; color: #2563eb; }
        .chat-text { margin-top: 4px; color: #374151; white-space: pre-wrap; }
        .manual-input-area { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #d1d5db; }
        .api-config { background-color: #f0f9ff; border-left: 4px solid #2563eb; }
    </style>
</head>
<body class="p-6">

<div class="max-w-7xl mx-auto">
    <div class="card mb-6">
        <h1 class="text-2xl font-bold text-gray-800">📊 AI财务测算工具</h1>
        <p class="text-gray-600 mt-2">基于最近邻集成预测复充率和平均每台流量成本，首月后仅计流量成本</p>
        <p class="text-xs text-red-500 mt-1">⚠️ 请自行填入您的 API Key（不会上传，仅本地使用）</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 左侧输入区 -->
        <div class="lg:col-span-1 space-y-6">
            <div class="card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">1. 发货与成本</h2>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">总发货量 (台)</label>
                    <input type="number" id="totalShipment" class="input-field" value="10000">
                </div>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">测算周期 (月)</label>
                    <input type="number" id="forecastMonths" class="input-field" value="18" onchange="updateMonths()">
                </div>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">月租金 (元)</label>
                    <input type="number" id="rent" class="input-field" value="20000">
                </div>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">月工资 (元)</label>
                    <input type="number" id="wage" class="input-field" value="200000">
                </div>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">翻新成本 (元/月)</label>
                    <input type="number" id="refurbCost" class="input-field" value="0">
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">2. 套餐与用户行为</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">平台</label>
                        <select id="platform" class="input-field">
                            <option value="抖音">抖音</option><option value="天猫">天猫</option>
                            <option value="京东">京东</option><option value="拼多多">拼多多</option>
                            <option value="快手">快手</option>
                            <option value="淘宝">淘宝</option>
                        </select>
                    </div>
                    <div><label class="text-sm font-bold">套餐定价 (元)</label><input type="number" id="price" class="input-field" value="29"></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">套餐用量 (GB)</label><input type="number" id="data_gb" class="input-field" value="100"></div>
                    <div><label class="text-sm font-bold">套餐类型</label>
                        <select id="type" class="input-field"><option value="月包">月包</option><option value="长周期">长周期</option></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">套餐种类</label>
                        <select id="category" class="input-field">
                            <option value="主套餐">主套餐</option><option value="体验套餐">体验套餐</option>
                            <option value="加油包">加油包</option>
                        </select>
                    </div>
                    <div><label class="text-sm font-bold">套餐周期 (天)</label><input type="number" id="period_days" class="input-field" value="30"></div>
                </div>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">首充率 (%)</label>
                    <input type="number" id="firstChargeRate" class="input-field" value="85">
                </div>
                <div id="manualInputArea" style="display:none;" class="manual-input-area">
                    <label class="text-sm font-bold">📝 手动输入复充率（17个，逗号分隔）</label>
                    <input type="text" id="manualRates" class="input-field mt-1" placeholder="1.0,0.72,...">
                    <label class="text-sm font-bold mt-2">📝 手动输入流量成本（17个，元/台，逗号分隔）</label>
                    <input type="text" id="manualCosts" class="input-field mt-1" placeholder="0,1.2,1.5,...">
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl font-bold text-gray-800 mb-4">3. 成本参数</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">硬件采购价 (元)</label><input type="number" id="hwCost" class="input-field" value="70"></div>
                    <div><label class="text-sm font-bold">终端售价 (元)</label><input type="number" id="hwPrice" class="input-field" value="59"></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">单台推广费 (元)</label><input type="number" id="marketingCost" class="input-field" value="30"></div>
                    <div><label class="text-sm font-bold">一退率 (%)</label><input type="number" id="return1" class="input-field" value="5"></div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">二/三退率 (%)</label><input type="number" id="return2" class="input-field" value="3"></div>
                    <div><label class="text-sm font-bold">沉默率 (%)</label><input type="number" id="silenceRate" class="input-field" value="10"></div>
                </div>
                <button onclick="calculateAndPredict()" class="btn-primary w-full">开始测算</button>
            </div>

            <div class="card api-config">
                <h2 class="text-xl font-bold text-gray-800 mb-4">4. AI 配置</h2>
                <div class="input-group mb-3">
                    <label class="text-sm font-bold">API Key</label>
                    <input type="password" id="apiKey" class="input-field" placeholder="sk-xxx">
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div><label class="text-sm font-bold">API 端点</label><input type="text" id="apiEndpoint" class="input-field" value="https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"></div>
                    <div><label class="text-sm font-bold">模型名称</label><input type="text" id="modelName" class="input-field" value="qwen-plus"></div>
                </div>
            </div>
        </div>

        <!-- 右侧结果区 -->
        <div class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="metric-card"><div class="text-sm">单台沉没成本</div><div class="metric-value" id="sunkCost">-</div><div class="text-xs">元</div></div>
                <div class="metric-card"><div class="text-sm">回本周期</div><div class="metric-value" id="paybackMonths">-</div><div class="text-xs">月</div></div>
                <div class="metric-card"><div class="text-sm">ROI</div><div class="metric-value" id="roi">-</div><div class="text-xs">%</div></div>
                <div class="metric-card"><div class="text-sm">累计现金流</div><div class="metric-value" id="cumulativeCash">-</div><div class="text-xs">万元</div></div>
            </div>
            <div class="card"><h3 class="text-lg font-bold mb-4">现金流趋势</h3><canvas id="cashFlowChart" height="100"></canvas></div>
            <div class="card overflow-x-auto"><h3 class="text-lg font-bold mb-4">月度明细</h3>
                <table class="min-w-full text-sm"><thead class="bg-gray-50"><tr><th>月份</th><th>活跃用户</th><th>收入(万)</th><th>支出(万)</th><th>利润(万)</th><th>累计(万)</th></tr></thead><tbody id="resultTableBody"></tbody>{" "}
                <p class="text-xs text-gray-500 mt-2">注：首月支出包含硬件净成本+固定成本+流量成本；第2月起支出仅含流量成本。</p>
            </div>
            <div class="card">
                <h3 class="text-lg font-bold mb-2">🤖 AI 智能顾问</h3>
                <div id="chatContainer" class="h-80 overflow-y-auto border rounded-lg p-3 mb-3 bg-gray-50">
                    <div class="chat-message"><span class="chat-ai">AI 顾问:</span><div class="chat-text">您好！请配置 API Key 并点击“开始测算”。</div></div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="chatInput" class="input-field flex-1" placeholder="例如：分析现金流压力">
                    <button onclick="sendToAI()" class="btn-primary">发送</button>
                    <button onclick="clearChatHistory()" class="btn-primary" style="background:#6b7280;">清空</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 全局 ==========
    let cashFlowChart = null;
    let currentResult = null;
    let packageLibrary = [];
    let chatMessages = [];

    // ========== 加载套餐库 ==========
    async function loadPackageLibrary() {
        try {
            const resp = await fetch('package_library.json');
            if (resp.ok) {
                packageLibrary = await resp.json();
                console.log(`加载套餐库成功，共 ${packageLibrary.length} 个分组`);
                return;
            }
        } catch(e) {}
        packageLibrary = [
            { platform:"抖音", price:29, data_gb:100, type:"月包", category:"主套餐", period_days:30,
              repurchase_rate: [1.0,0.72,0.58,0.49,0.43,0.38,0.34,0.31,0.28,0.26,0.24,0.22,0.20,0.19,0.18,0.17,0.16],
              avg_monthly_cost: [0,1.2,1.3,1.5,1.6,1.7,1.8,1.9,2.0,2.1,2.2,2.3,2.4,2.5,2.6,2.7,2.8],
              early_avg_cost: 1.2 },
            { platform:"抖音", price:49, data_gb:200, type:"月包", category:"主套餐", period_days:30,
              repurchase_rate: [1.0,0.68,0.55,0.47,0.42,0.37,0.33,0.30,0.27,0.25,0.23,0.21,0.19,0.18,0.17,0.16,0.15],
              avg_monthly_cost: [0,1.1,1.2,1.4,1.5,1.6,1.7,1.8,1.9,2.0,2.1,2.2,2.3,2.4,2.5,2.6,2.7],
              early_avg_cost: 1.1 },
            { platform:"淘宝", price:29, data_gb:100, type:"月包", category:"主套餐", period_days:30,
              repurchase_rate: [1.0,0.70,0.56,0.48,0.42,0.37,0.33,0.30,0.27,0.25,0.23,0.21,0.19,0.18,0.17,0.16,0.15],
              avg_monthly_cost: [0,1.3,1.4,1.6,1.7,1.8,1.9,2.0,2.1,2.2,2.3,2.4,2.5,2.6,2.7,2.8,2.9],
              early_avg_cost: 1.3 }
        ];
    }

    function safe_log(x, eps=1e-6) { return Math.log(Math.max(x, eps)); }

    function getVector(pkg, early_avg=0) {
        const price_log = safe_log(pkg.price);
        const data_log = safe_log(pkg.data_gb);
        const period_log = safe_log(pkg.period_days);
        const period_ratio = safe_log(pkg.period_days / 30.0);
        const type_vec = pkg.type === '月包' ? [1,0] : [0,1];
        const catMap = { '主套餐':[1,0,0], '体验套餐':[0,1,0], '加油包':[0,0,1] };
        const cat_vec = catMap[pkg.category] || [0,0,0];
        const is_exp = pkg.category === '体验套餐' ? 1 : 0;
        return [price_log, data_log, period_log, period_ratio, ...type_vec, ...cat_vec, is_exp, early_avg];
    }

    function weightedEuclidean(v1, v2, weights) {
        let sum = 0;
        for (let i=0; i<v1.length; i++) sum += weights[i] * (v1[i]-v2[i])**2;
        return Math.sqrt(sum);
    }

    function predictRepurchaseAndCost(target) {
        let candidates = packageLibrary.filter(p => p.platform === target.platform && p.type === target.type);
        if (candidates.length === 0) {
            document.getElementById('manualInputArea').style.display = 'block';
            return { repurchase_rate: null, avg_monthly_cost: null };
        }
        document.getElementById('manualInputArea').style.display = 'none';
        
        let sameGroup = candidates.find(p => p.platform === target.platform && p.price === target.price && p.data_gb === target.data_gb && p.type === target.type && p.category === target.category && p.period_days === target.period_days);
        let early_avg = sameGroup && sameGroup.early_avg_cost !== undefined ? sameGroup.early_avg_cost : 0;
        const targetVec = getVector(target, early_avg);
        const weights = [1.0, 0.8, 0.5, 1.0, 0.3, 0.3, 0.2, 0.2, 0.2, 1.2, 1.5];
        let distList = candidates.map(c => {
            let early = c.early_avg_cost !== undefined ? c.early_avg_cost : 0;
            let vec = getVector(c, early);
            return { dist: weightedEuclidean(targetVec, vec, weights), pkg: c };
        });
        distList.sort((a,b) => a.dist - b.dist);
        const ks = [3,5,7];
        let predRatesEns = [], predCostsEns = [];
        for (let k of ks) {
            let top = distList.slice(0, k);
            let sumW = 0;
            let predRate = new Array(17).fill(0);
            let predCost = new Array(17).fill(0);
            for (let item of top) {
                let w = 1.0 / (item.dist + 1e-9);
                sumW += w;
                for (let t=0; t<17; t++) {
                    predRate[t] += w * item.pkg.repurchase_rate[t];
                    predCost[t] += w * item.pkg.avg_monthly_cost[t];
                }
            }
            for (let t=0; t<17; t++) {
                predRate[t] /= sumW;
                predCost[t] /= sumW;
            }
            predRatesEns.push(predRate);
            predCostsEns.push(predCost);
        }
        let finalRate = new Array(17).fill(0);
        let finalCost = new Array(17).fill(0);
        for (let t=0; t<17; t++) {
            for (let i=0; i<ks.length; i++) {
                finalRate[t] += predRatesEns[i][t];
                finalCost[t] += predCostsEns[i][t];
            }
            finalRate[t] /= ks.length;
            finalCost[t] /= ks.length;
        }
        return { repurchase_rate: finalRate, avg_monthly_cost: finalCost };
    }

    function parseManualSeq(str) {
        if (!str.trim()) return null;
        let parts = str.split(',').map(s => parseFloat(s.trim()));
        if (parts.length !== 17 || parts.some(isNaN)) return null;
        return parts;
    }

    // ========== 财务计算（首月后只计流量成本） ==========
    async function calculateAndPredict() {
        const target = {
            platform: document.getElementById('platform').value,
            price: parseFloat(document.getElementById('price').value),
            data_gb: parseFloat(document.getElementById('data_gb').value),
            type: document.getElementById('type').value,
            category: document.getElementById('category').value,
            period_days: parseFloat(document.getElementById('period_days').value)
        };
        let pred = predictRepurchaseAndCost(target);
        let manualRates = parseManualSeq(document.getElementById('manualRates').value);
        let manualCosts = parseManualSeq(document.getElementById('manualCosts').value);
        let repurchaseRates = manualRates || pred.repurchase_rate;
        let trafficCosts = manualCosts || pred.avg_monthly_cost;
        if (!repurchaseRates || !trafficCosts) {
            alert("未找到相似套餐，请手动输入复充率和流量成本序列（17个数字）。");
            document.getElementById('manualInputArea').style.display = 'block';
            return;
        }

        const months = parseInt(document.getElementById('forecastMonths').value) || 18;
        let repRates = repurchaseRates.slice(0, months-1);
        if (repRates.length < months-1) repRates.push(...new Array(months-1 - repRates.length).fill(0));
        let trafficSeq = trafficCosts.slice(0, months-1);
        if (trafficSeq.length < months-1) trafficSeq.push(...new Array(months-1 - trafficSeq.length).fill(0));

        const totalShipment = parseInt(document.getElementById('totalShipment').value);
        const hwCost = parseFloat(document.getElementById('hwCost').value);
        const hwPrice = parseFloat(document.getElementById('hwPrice').value);
        const marketingCost = parseFloat(document.getElementById('marketingCost').value);
        const rent = parseFloat(document.getElementById('rent').value);
        const wage = parseFloat(document.getElementById('wage').value);
        const firstChargeRate = parseFloat(document.getElementById('firstChargeRate').value) / 100;
        const refurbCost = parseFloat(document.getElementById('refurbCost').value);
        const price = target.price;

        const firstRate = firstChargeRate;
        const hardwareNetCost = totalShipment * (hwCost + marketingCost - hwPrice);
        const monthlyFixedCost = rent + wage + refurbCost;

        let activeUsers = new Array(months).fill(0);
        let revenue = new Array(months).fill(0);
        activeUsers[0] = totalShipment * firstRate;
        revenue[0] = activeUsers[0] * price;
        for (let i=1; i<months; i++) {
            const repRate = repRates[i-1];
            activeUsers[i] = totalShipment * firstRate * repRate;
            revenue[i] = activeUsers[i] * price;
        }

        let expense = new Array(months).fill(0);
        for (let i=0; i<months; i++) {
            let trafficTotal = 0;
            if (i === 0) {
                trafficTotal = activeUsers[i] * (trafficSeq[0] || 0);
                expense[i] = hardwareNetCost + monthlyFixedCost + trafficTotal;
            } else {
                trafficTotal = activeUsers[i] * (trafficSeq[i-1] || 0);
                expense[i] = trafficTotal;   // 后续月份仅流量成本
            }
        }

        let profit = new Array(months).fill(0);
        let cumulative = 0;
        let cumulativeHistory = [];
        for (let i=0; i<months; i++) {
            profit[i] = revenue[i] - expense[i];
            cumulative += profit[i];
            cumulativeHistory.push(cumulative);
        }

        const totalRevenue = revenue.reduce((a,b)=>a+b,0);
        const totalExpense = expense.reduce((a,b)=>a+b,0);
        const totalProfit = totalRevenue - totalExpense;
        const roi = totalExpense === 0 ? 0 : (totalProfit / totalExpense) * 100;
        let payback = -1;
        let cum = 0;
        for (let i=0; i<months; i++) {
            cum += profit[i];
            if (cum >= 0 && payback === -1) payback = i+1;
        }
        const sunkCost = (hwCost + marketingCost - hwPrice) > 0 ? (hwCost+marketingCost-hwPrice) : 0;

        const monthlyDetails = [];
        for (let i=0; i<months; i++) {
            monthlyDetails.push({
                month: i+1,
                activeUsers: Math.floor(activeUsers[i]),
                revenue: revenue[i],
                expense: expense[i],
                profit: profit[i],
                cumulative: cumulativeHistory[i]
            });
        }

        currentResult = {
            sunk_cost: sunkCost,
            payback_months: payback>0 ? payback : months+1,
            roi: roi,
            cumulative_cash: cumulative,
            max_monthly_loss: Math.min(...profit),
            monthly_details: monthlyDetails,
            monthly_profit: profit,
            monthly_revenue: revenue,
            cumulative_cash_history: cumulativeHistory,
            active_users: monthlyDetails.map(d => d.activeUsers),
            monthly_expense: expense
        };
        displayResult(currentResult, months);
    }

    function displayResult(data, months) {
        document.getElementById('sunkCost').innerText = data.sunk_cost.toFixed(2);
        document.getElementById('paybackMonths').innerText = data.payback_months;
        document.getElementById('roi').innerText = data.roi.toFixed(1);
        document.getElementById('cumulativeCash').innerText = (data.cumulative_cash/10000).toFixed(1);
        const tbody = document.getElementById('resultTableBody');
        tbody.innerHTML = '';
        for (let i=0; i<months; i++) {
            const profitClass = data.monthly_profit[i] >= 0 ? 'text-profit' : 'text-loss';
            tbody.innerHTML += `<tr class="border-b">
                <td class="table-cell">M${i+1}</td>
                <td class="table-cell">${data.active_users[i]}</td>
                <td class="table-cell">¥${(data.monthly_revenue[i]/10000).toFixed(1)}万</td>
                <td class="table-cell">¥${(data.monthly_expense[i]/10000).toFixed(1)}万</td>
                <td class="table-cell font-bold ${profitClass}">¥${(data.monthly_profit[i]/10000).toFixed(1)}万</td>
                <td class="table-cell font-bold">¥${(data.cumulative_cash_history[i]/10000).toFixed(1)}万</td>
            </tr>`;
        }
        if (cashFlowChart) cashFlowChart.destroy();
        const ctx = document.getElementById('cashFlowChart').getContext('2d');
        cashFlowChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length:months}, (_,i)=>`M${i+1}`),
                datasets: [
                    { label:'累计现金流', data:data.cumulative_cash_history, borderColor:'#2563eb', fill:true },
                    { label:'月利润', data:data.monthly_profit, borderColor:'#10b981', borderDash:[5,5], fill:false }
                ]
            },
            options: { responsive: true }
        });
    }

    // ========== AI 聊天（保持原样） ==========
    function formatFinancialContext(result) {
        if (!result) return "暂无财务数据。";
        let text = `当前财务测算结果：\n- 回本周期：${result.payback_months}个月\n- ROI：${result.roi.toFixed(1)}%\n- 累计现金流：${(result.cumulative_cash/10000).toFixed(2)}万元\n- 最大单月亏损：${result.max_monthly_loss.toFixed(0)}元\n\n月度明细（元）：\n月份\t活跃用户\t收入\t支出\t利润\t累计\n`;
        for (let d of result.monthly_details) {
            text += `${d.month}\t${d.activeUsers}\t${d.revenue.toFixed(0)}\t${d.expense.toFixed(0)}\t${d.profit.toFixed(0)}\t${d.cumulative.toFixed(0)}\n`;
        }
        return text;
    }

    async function sendToAI() {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) { alert("请填写 API Key"); return; }
        const endpoint = document.getElementById('apiEndpoint').value.trim();
        const model = document.getElementById('modelName').value.trim();
        const question = document.getElementById('chatInput').value.trim();
        if (!question) return;
        const container = document.getElementById('chatContainer');
        container.innerHTML += `<div class="chat-message"><span class="chat-user">您:</span><div class="chat-text">${escapeHtml(question)}</div></div>`;
        document.getElementById('chatInput').value = '';
        container.scrollTop = container.scrollHeight;

        const loadingId = "loading_" + Date.now();
        container.innerHTML += `<div id="${loadingId}" class="chat-message"><span class="chat-ai">AI 顾问:</span><div class="chat-text">分析中...</div></div>`;
        container.scrollTop = container.scrollHeight;

        try {
            const messages = [
                { role: "system", content: "你是随身WiFi财务顾问，基于用户提供的财务数据给出专业建议，要求条理清晰、数据驱动。" },
                ...chatMessages,
                { role: "user", content: `${formatFinancialContext(currentResult)}\n用户问题：${question}` }
            ];
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages, temperature: 0.7, max_tokens: 2048 })
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const reply = data.choices?.[0]?.message?.content || "无法获取回复。";
            document.getElementById(loadingId)?.remove();
            container.innerHTML += `<div class="chat-message"><span class="chat-ai">AI 顾问:</span><div class="chat-text">${reply.replace(/\n/g, '<br>')}</div></div>`;
            chatMessages.push({ role: "user", content: question }, { role: "assistant", content: reply });
            if (chatMessages.length > 20) chatMessages = chatMessages.slice(-20);
        } catch (err) {
            document.getElementById(loadingId)?.remove();
            container.innerHTML += `<div class="chat-message"><span class="chat-ai">AI 顾问:</span><div class="chat-text">调用失败：${err.message}</div></div>`;
        }
        container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    function clearChatHistory() {
        chatMessages = [];
        document.getElementById('chatContainer').innerHTML = '<div class="chat-message"><span class="chat-ai">AI 顾问:</span><div class="chat-text">对话已清空。</div></div>';
    }
    function updateMonths() { calculateAndPredict(); }

    window.onload = async () => {
        await loadPackageLibrary();
        calculateAndPredict();
    };
</script>
</body>
</html>
